<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Vibrator</title>
</head>
<body>
  <h2>Music Vibration Demo</h2>
  <input type="file" id="audioFile" accept="audio/*">
  <button onclick="start()">Start</button>

  <audio id="audio" controls></audio>

  <script>
    let audioContext, analyser, source, dataArray;

    const audio = document.getElementById("audio");
    const fileInput = document.getElementById("audioFile");

    fileInput.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        audio.src = URL.createObjectURL(file);
      }
    });

    function start() {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();

      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);

      analyser.fftSize = 256;
      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      audio.play();
      vibrateLoop();
    }

    function vibrateLoop() {
      analyser.getByteFrequencyData(dataArray);

      let sum = 0;
      for (let i = 0; i < dataArray.length; i++) {
        sum += dataArray[i];
      }

      let avg = sum / dataArray.length;

      // Convert sound intensity to vibration duration
      let vibrationTime = Math.min(200, avg);

      if (navigator.vibrate) {
        navigator.vibrate(vibrationTime);
      }

      requestAnimationFrame(vibrateLoop);
    }
  </script>
</body>
</html>
