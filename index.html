<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe Player</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #121212;
  color: white;
}

/* MAIN CONTAINER */
.container {
  padding: 15px;
}

/* ALBUM ART */
.art {
  width: 100%;
  height: 280px;
  border-radius: 20px;
  background: linear-gradient(135deg, #1db954, #191414);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
}

/* TITLE */
.title {
  margin-top: 15px;
  font-size: 18px;
}

/* FILE PICKER */
.file-box {
  margin-top: 15px;
}
.file-btn {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  background: #1db954;
  color: black;
  font-weight: bold;
  text-align: center;
}
input[type="file"] {
  display: none;
}

/* CONTROLS */
.controls {
  margin-top: 25px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

.btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #282828;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

.play {
  width: 85px;
  height: 85px;
  background: #1db954;
  color: black;
  font-size: 30px;
}

/* PROGRESS */
.progress {
  width: 100%;
  margin-top: 20px;
}

/* TOGGLE SWITCH */
.toggle-row {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.switch {
  position: relative;
  width: 50px;
  height: 28px;
}
.switch input {
  display: none;
}
.slider {
  position: absolute;
  cursor: pointer;
  background: #555;
  border-radius: 30px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: 0.3s;
}
.slider:before {
  content: "";
  position: absolute;
  height: 22px;
  width: 22px;
  left: 3px;
  bottom: 3px;
  background: white;
  border-radius: 50%;
  transition: 0.3s;
}
input:checked + .slider {
  background: #1db954;
}
input:checked + .slider:before {
  transform: translateX(22px);
}

/* VISUALIZER */
canvas {
  width: 100%;
  height: 160px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="art" id="art">🎵</div>

  <div class="title" id="title">No audio selected</div>

  <!-- FILE PICKER -->
  <div class="file-box">
    <label class="file-btn">
      Select Audio
      <input type="file" id="file" accept="audio/*">
    </label>
  </div>

  <!-- PROGRESS -->
  <input type="range" class="progress" id="progress" value="0">

  <!-- CONTROLS -->
  <div class="controls">
    <div class="btn" onclick="seek(-10)">⏪</div>
    <div class="btn play" onclick="togglePlay()" id="playBtn">▶</div>
    <div class="btn" onclick="seek(10)">⏩</div>
  </div>

  <!-- TOGGLE -->
  <div class="toggle-row">
    <span>Vibration</span>
    <label class="switch">
      <input type="checkbox" id="vibeSwitch" checked>
      <span class="slider"></span>
    </label>
  </div>

  <canvas id="viz"></canvas>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");
let vibeSwitch = document.getElementById("vibeSwitch");

let ctx, analyser, dataArray, bufferLength;
let audioCtx;
let isPlaying = false;

/* FIXED FILE PICKER */
document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    audio.src = URL.createObjectURL(file);
    document.getElementById("title").innerText = file.name;
  }
});

/* SETUP */
function setup() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();

  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 128;
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);
}

/* PLAY / PAUSE */
function togglePlay() {
  if (!audio.src) return;

  if (!audioCtx) setup();

  if (audio.paused) {
    audio.play();
    playBtn.innerText = "❚❚";
    isPlaying = true;
    animate();
  } else {
    audio.pause();
    playBtn.innerText = "▶";
    isPlaying = false;
  }
}

/* SEEK */
function seek(sec) {
  audio.currentTime += sec;
}

/* PROGRESS */
audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};

/* VISUALIZER */
const canvas = document.getElementById("viz");
const c = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = 160;

function animate() {
  if (!isPlaying) return;

  requestAnimationFrame(animate);

  analyser.getByteFrequencyData(dataArray);
  c.clearRect(0, 0, canvas.width, canvas.height);

  let barWidth = canvas.width / bufferLength;
  let sum = 0;

  for (let i = 0; i < bufferLength; i++) {
    let val = dataArray[i];
    sum += val;

    c.fillStyle = `rgb(${val},200,120)`;
    c.fillRect(i * barWidth, canvas.height - val, barWidth - 2, val);
  }

  let avg = sum / bufferLength;

  if (vibeSwitch.checked && navigator.vibrate) {
    navigator.vibrate(Math.min(120, avg));
  }
}
</script>

</body>
</html>
