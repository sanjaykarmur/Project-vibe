<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Player</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui;
  background: #0d0d0d;
  color: white;
}

/* TOP SECTION */
.top {
  padding: 20px;
}

/* ALBUM ART */
.art {
  width: 100%;
  height: 300px;
  border-radius: 25px;
  background: linear-gradient(145deg,#1db954,#0d0d0d);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
  box-shadow: 0 10px 40px rgba(0,255,150,0.3);
}

/* TITLE */
.title {
  margin-top: 15px;
  font-size: 20px;
  font-weight: 600;
}

/* FILE PICKER */
.upload {
  margin-top: 15px;
}
.upload label {
  display: block;
  background: rgba(255,255,255,0.05);
  padding: 14px;
  border-radius: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
}
.upload input { display: none; }

/* PROGRESS */
.progress {
  width: 100%;
  margin-top: 20px;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 25px;
  margin-top: 25px;
}

.btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.play {
  width: 80px;
  height: 80px;
  background: #1db954;
  color: black;
  font-size: 28px;
}

/* TOGGLE */
.setting {
  margin-top: 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.switch {
  position: relative;
  width: 52px;
  height: 28px;
}
.switch input { display: none; }

.slider {
  position: absolute;
  background: #444;
  border-radius: 30px;
  top:0;left:0;right:0;bottom:0;
}
.slider:before {
  content:"";
  position:absolute;
  width:22px;height:22px;
  left:3px;bottom:3px;
  background:white;
  border-radius:50%;
  transition:0.3s;
}

input:checked + .slider {
  background:#1db954;
}
input:checked + .slider:before {
  transform: translateX(24px);
}

/* VISUALIZER */
canvas {
  width: 100%;
  height: 120px;
  margin-top: 20px;
}

/* BOTTOM SAFE SPACE */
.bottom-space {
  height: 30px;
}
</style>
</head>

<body>

<div class="top">

  <div class="art" id="art">🎵</div>

  <div class="title" id="title">Select a track</div>

  <div class="upload">
    <label>
      Choose Audio
      <input type="file" id="file" accept="audio/*">
    </label>
  </div>

  <input type="range" id="progress" class="progress" value="0">

  <div class="controls">
    <div class="btn" onclick="seek(-10)">⏪</div>
    <div class="btn play" id="playBtn" onclick="togglePlay()">▶</div>
    <div class="btn" onclick="seek(10)">⏩</div>
  </div>

  <div class="setting">
    <span>Vibration</span>
    <label class="switch">
      <input type="checkbox" id="vibe" checked>
      <span class="slider"></span>
    </label>
  </div>

  <canvas id="viz"></canvas>

  <div class="bottom-space"></div>

</div>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");
let vibe = document.getElementById("vibe");
let lastBeat = 0;
  
let ctx, analyser, dataArray;
let audioCtx;
let playing = false;

/* FILE */
document.getElementById("file").addEventListener("change", e => {
  let file = e.target.files[0];
  if (!file) return;

  audio.src = URL.createObjectURL(file);
  document.getElementById("title").innerText = file.name;
});

/* SETUP */
function setup(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();

  let src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 128;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
}

/* PLAY */
function togglePlay(){
  if(!audio.src) return;

  if(!audioCtx) setup();

  if(audio.paused){
    audio.play();
    playBtn.innerText="❚❚";
    playing=true;
    loop();
  } else {
    audio.pause();
    playBtn.innerText="▶";
    playing=false;
  }
}

/* SEEK */
function seek(s){ audio.currentTime+=s; }

/* PROGRESS */
audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100||0;
};

progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
};

/* VISUAL + VIBRATION */
const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");
canvas.width=window.innerWidth;

function loop(){
  if(!playing) return;

  requestAnimationFrame(loop);

  analyser.getByteFrequencyData(dataArray);
  c.clearRect(0,0,canvas.width,120);

  let w=canvas.width/dataArray.length;
  let sum=0;

  for(let i=0;i<dataArray.length;i++){
    let v=dataArray[i];
    sum+=v;
    c.fillStyle=`rgb(${v},200,150)`;
    c.fillRect(i*w,120-v,w-2,v);
  }

let threshold = 160; // adjust sensitivity

function loop(){
  if(!playing) return;

  requestAnimationFrame(loop);

  analyser.getByteFrequencyData(dataArray);
  c.clearRect(0,0,canvas.width,120);

  let w = canvas.width / dataArray.length;

  // 🎨 draw bars
  for(let i=0;i<dataArray.length;i++){
    let v = dataArray[i];
    c.fillStyle = `rgb(${v},200,150)`;
    c.fillRect(i*w,120-v,w-2,v);
  }

  // 🎧 BASS DETECTION (first ~20 bins = low freq)
  let bass = 0;
  for(let i = 0; i < 20; i++){
    bass += dataArray[i];
  }
  bass = bass / 20;

  let now = Date.now();

  // 🔥 BEAT DETECTION (spike + cooldown)
  if (
    vibe.checked &&
    navigator.vibrate &&
    bass > threshold &&
    now - lastBeat > 120   // cooldown (ms)
  ) {
    navigator.vibrate(60); // short punch vibration
    lastBeat = now;
  }
}
}
</script>

</body>
</html>
