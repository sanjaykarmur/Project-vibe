<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibe Player Mobile</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0a0a0a;
  color: white;
  text-align: center;
}

/* HEADER */
h2 {
  margin: 15px 0 5px;
}

/* FILE PICKER */
.upload {
  margin: 15px;
}
.upload label {
  display: inline-block;
  padding: 12px 18px;
  border-radius: 15px;
  background: #1f1f1f;
  border: 1px solid #333;
}
.upload input {
  display: none;
}

/* PLAYER */
.player {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin: 20px 0;
}

.btn {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #1f1f1f;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 22px;
}

.btn:active {
  transform: scale(0.95);
}

/* MAIN BUTTON */
.play {
  width: 75px;
  height: 75px;
  font-size: 26px;
  background: #00ffc3;
  color: black;
}

/* TOGGLE */
.toggle {
  margin: 10px;
}
.toggle button {
  padding: 10px 16px;
  border-radius: 12px;
  background: #1f1f1f;
  color: white;
  border: none;
}

/* CANVAS */
canvas {
  width: 100%;
  height: 180px;
  margin-top: 10px;
}

/* PROGRESS */
.progress {
  width: 90%;
  margin: auto;
}
</style>
</head>

<body>

<h2>🎵 Vibe Player</h2>

<div class="upload">
  <label>📂 Select Audio</label>
  <input type="file" id="file" accept="audio/*">
</div>

<div class="player">
  <div class="btn" onclick="seek(-10)">⏪</div>
  <div class="btn play" onclick="togglePlay()" id="playBtn">▶️</div>
  <div class="btn" onclick="seek(10)">⏩</div>
</div>

<div class="toggle">
  <button id="vibeToggle" onclick="toggleVibration()">Vibration: ON</button>
</div>

<input type="range" class="progress" id="progress" value="0">

<canvas id="viz"></canvas>

<audio id="audio"></audio>

<script>
let audio = document.getElementById("audio");
let playBtn = document.getElementById("playBtn");
let progress = document.getElementById("progress");
let vibeBtn = document.getElementById("vibeToggle");

let ctx, analyser, dataArray, bufferLength;
let audioCtx;

let vibrationEnabled = true;
let isPlaying = false;

/* FILE LOAD */
document.getElementById("file").addEventListener("change", e => {
  const file = e.target.files[0];
  if (file) {
    audio.src = URL.createObjectURL(file);
  }
});

/* AUDIO SETUP */
function setup() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();

  const src = audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);

  analyser.fftSize = 128;
  bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);
}

/* PLAY / PAUSE */
function togglePlay() {
  if (!audioCtx) setup();

  if (audio.paused) {
    audio.play();
    playBtn.innerHTML = "⏸️";
    isPlaying = true;

    // Disable toggle while playing
    vibeBtn.disabled = true;
    vibeBtn.style.opacity = 0.5;

    animate();
  } else {
    audio.pause();
    playBtn.innerHTML = "▶️";
    isPlaying = false;

    // Enable toggle again
    vibeBtn.disabled = false;
    vibeBtn.style.opacity = 1;
  }
}

/* SEEK */
function seek(sec) {
  audio.currentTime += sec;
}

/* VIBRATION TOGGLE */
function toggleVibration() {
  vibrationEnabled = !vibrationEnabled;
  vibeBtn.innerText = "Vibration: " + (vibrationEnabled ? "ON" : "OFF");
}

/* PROGRESS */
audio.ontimeupdate = () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
};

progress.oninput = () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
};

/* VISUALIZER */
const canvas = document.getElementById("viz");
const c = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = 180;

function animate() {
  if (!isPlaying) return;

  requestAnimationFrame(animate);

  analyser.getByteFrequencyData(dataArray);

  c.clearRect(0, 0, canvas.width, canvas.height);

  let barWidth = canvas.width / bufferLength;

  let sum = 0;

  for (let i = 0; i < bufferLength; i++) {
    let val = dataArray[i];
    sum += val;

    c.fillStyle = `rgb(${val+50}, 200, 255)`;
    c.fillRect(i * barWidth, canvas.height - val, barWidth - 2, val);
  }

  let avg = sum / bufferLength;

  if (vibrationEnabled && navigator.vibrate) {
    let time = Math.min(120, avg);
    navigator.vibrate(time);
  }
}
</script>

</body>
</html>
