<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Player</title>

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:system-ui;background:#0d0d0d;color:white;}
.container{padding:20px;}
.art{
  width:100%;height:300px;border-radius:25px;
  background:linear-gradient(145deg,#1db954,#0d0d0d);
  display:flex;align-items:center;justify-content:center;
  font-size:50px;
}
.title{margin-top:15px;}
.upload label{display:block;padding:14px;border-radius:15px;background:#1f1f1f;text-align:center;}
.upload input{display:none;}
.progress{width:100%;margin-top:20px;}
.controls{display:flex;justify-content:center;gap:25px;margin-top:25px;}
.btn{width:60px;height:60px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;}
.play{width:80px;height:80px;background:#1db954;color:black;}
.setting{margin-top:25px;display:flex;justify-content:space-between;}
.switch{position:relative;width:52px;height:28px;}
.switch input{display:none;}
.slider{position:absolute;inset:0;background:#444;border-radius:30px;}
.slider:before{content:"";position:absolute;width:22px;height:22px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.3s;}
input:checked + .slider{background:#1db954;}
input:checked + .slider:before{transform:translateX(24px);}
canvas{width:100%;height:120px;margin-top:20px;}
</style>
</head>

<body>

<div class="container">
  <div class="art">🎵</div>
  <div class="title" id="title">Select a track</div>

  <div class="upload">
    <label>Choose Audio
      <input type="file" id="file" accept="audio/*">
    </label>
  </div>

  <input type="range" id="progress" class="progress">

  <div class="controls">
    <div class="btn" onclick="seek(-10)">⏪</div>
    <div class="btn play" id="playBtn" onclick="togglePlay()">▶</div>
    <div class="btn" onclick="seek(10)">⏩</div>
  </div>

  <div class="setting">
    <span>Vibration</span>
    <label class="switch">
      <input type="checkbox" id="vibe" checked>
      <span class="slider"></span>
    </label>
  </div>

  <canvas id="viz"></canvas>
</div>

<audio id="audio"></audio>

<script>
let audio=document.getElementById("audio");
let playBtn=document.getElementById("playBtn");
let progress=document.getElementById("progress");
let vibe=document.getElementById("vibe");

let analyser,dataArray,audioCtx;
let playing=false;

document.getElementById("file").addEventListener("change",e=>{
  let f=e.target.files[0];
  if(!f)return;
  audio.src=URL.createObjectURL(f);
  title.innerText=f.name;
});

function setup(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  let src=audioCtx.createMediaElementSource(audio);
  src.connect(analyser);
  analyser.connect(audioCtx.destination);
  analyser.fftSize=128;
  dataArray=new Uint8Array(analyser.frequencyBinCount);
}

function togglePlay(){
  if(!audio.src)return;
  if(!audioCtx)setup();

  if(audio.paused){
    audio.play();
    playBtn.innerText="❚❚";
    playing=true;
    loop();
  }else{
    audio.pause();
    playBtn.innerText="▶";
    playing=false;
  }
}

function seek(s){audio.currentTime+=s;}

audio.ontimeupdate=()=>{
  progress.value=(audio.currentTime/audio.duration)*100||0;
};
progress.oninput=()=>{
  audio.currentTime=(progress.value/100)*audio.duration;
};

const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");
canvas.width=window.innerWidth;

/* 🔥 STABLE ENGINE */
let lastBeat=0;
let prevBass=0;
let smoothBass=0;

function loop(){
  if(!playing)return;

  requestAnimationFrame(loop);

  analyser.getByteFrequencyData(dataArray);
  c.clearRect(0,0,canvas.width,120);

  let w=canvas.width/dataArray.length;
  let bass=0;

  for(let i=0;i<20;i++){
    bass+=dataArray[i];
    let v=dataArray[i];
    c.fillStyle=`rgb(${v},200,150)`;
    c.fillRect(i*w,120-v,w-2,v);
  }

  bass/=20;

  smoothBass = smoothBass*0.6 + bass*0.4;

  let delta = smoothBass - prevBass;
  let threshold = 12 + smoothBass*0.03;

  let now = performance.now();

  if(
    vibe.checked &&
    navigator.vibrate &&
    delta > threshold &&
    now - lastBeat > 120
  ){
    // 🔥 PATTERN vibration (feels stronger & avoids suppression)
    let strength = Math.min(120, smoothBass);

    navigator.vibrate([
      strength, 40, strength/2
    ]);

    lastBeat = now;
  }

  prevBass = smoothBass;
}
</script>

</body>
</html>
